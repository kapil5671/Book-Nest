<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BookNest — My Profile</title>
<link rel="icon" href="ScVZdx2Y_400x400.jpg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --green:#1c6b3f;--green-dark:#134d2d;--gold:#c99a3a;--gold-light:#e2b968;
    --ink:#1a2b22;--muted:#6b7c72;--bg:#f5f7f4;--line:#e6ebe6;
    --shadow:0 10px 30px rgba(19,77,45,.12);--shadow-sm:0 4px 14px rgba(0,0,0,.08);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Poppins',system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6}
  h1,h2,h3,.brand-name{font-family:'Playfair Display',serif}
  a{text-decoration:none;color:inherit}
  img{max-width:100%;display:block}
  .container{width:min(1000px,92%);margin:0 auto}

  header{
    background:linear-gradient(120deg,var(--green-dark),var(--green) 55%,#20613a);
    box-shadow:0 6px 24px rgba(19,77,45,.35);border-bottom:3px solid var(--gold);
    position:sticky;top:0;z-index:20;
  }
  .nav{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 0}
  .brand{display:flex;align-items:center;gap:12px}
  .brand img{width:48px;height:48px;border-radius:11px;background:#fff;padding:3px;box-shadow:0 4px 14px rgba(0,0,0,.25)}
  .brand-name{font-size:1.5rem;font-weight:800;color:#fff}
  .brand-name .n{color:var(--gold-light)}
  .nav-actions{display:flex;gap:8px;align-items:center}
  .nav-actions a,.nav-actions button{
    font-family:inherit;font-size:.9rem;font-weight:500;padding:9px 16px;border-radius:30px;cursor:pointer;border:none;transition:.2s
  }
  .btn-ghost{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)!important}
  .btn-ghost:hover{background:rgba(255,255,255,.25)}
  .btn-gold{background:var(--gold);color:#231a06}
  .btn-gold:hover{background:var(--gold-light)}

  .wrap{padding:40px 0 70px}
  .loading{text-align:center;padding:80px 20px;color:var(--muted)}
  .spinner{display:inline-block;width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* Profile card */
  .profile-card{
    background:linear-gradient(120deg,var(--green-dark),var(--green));color:#fff;
    border-radius:22px;padding:34px;display:flex;align-items:center;gap:26px;flex-wrap:wrap;
    box-shadow:var(--shadow);position:relative;overflow:hidden;margin-bottom:36px
  }
  .profile-card::after{content:"";position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:rgba(226,185,104,.18)}
  .avatar{
    width:96px;height:96px;border-radius:50%;background:var(--gold);color:#231a06;
    display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;
    font-size:2.4rem;font-weight:800;box-shadow:0 8px 20px rgba(0,0,0,.3);flex-shrink:0;z-index:1
  }
  .p-info{z-index:1}
  .p-info h1{font-size:2rem;margin-bottom:4px}
  .p-info .meta{opacity:.9;font-size:.95rem;display:flex;flex-direction:column;gap:2px}
  .p-info .meta span b{color:var(--gold-light);font-weight:600}

  .section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
  .section-title h2{color:var(--green-dark);font-size:1.6rem}
  .section-title .count{background:var(--green);color:#fff;font-size:.8rem;font-weight:600;padding:3px 12px;border-radius:20px}

  .stays{display:grid;gap:16px}
  .stay{
    background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;
    display:flex;gap:0;box-shadow:var(--shadow-sm);transition:.2s
  }
  .stay:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
  .stay img{width:150px;height:100%;min-height:130px;object-fit:cover;flex-shrink:0}
  .stay-body{padding:16px 20px;flex:1;display:flex;flex-direction:column}
  .stay-body h3{font-family:'Poppins';font-size:1.15rem;color:var(--green-dark);margin-bottom:4px}
  .stay-body .dates{color:var(--muted);font-size:.88rem;margin-bottom:8px}
  .stay-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:auto;align-items:center}
  .stay-tags .ref{background:#e4f3ea;color:var(--green-dark);font-size:.74rem;font-weight:600;padding:3px 11px;border-radius:20px}
  .stay-tags .total{margin-left:auto;font-weight:700;color:var(--green);font-size:1.15rem;font-family:'Playfair Display',serif}
  .stay-tags .nights{color:var(--muted);font-size:.8rem}

  .empty{background:#fff;border:2px dashed var(--line);border-radius:18px;text-align:center;padding:50px 20px;color:var(--muted)}
  .empty a{color:var(--green);font-weight:600}
  @media(max-width:560px){
    .stay{flex-direction:column}
    .stay img{width:100%;height:160px}
    .p-info h1{font-size:1.6rem}
  }
</style>
</head>
<body>
<header>
  <div class="container nav">
    <a href="index.html" class="brand">
      <img src="ScVZdx2Y_400x400.jpg" alt="BookNest"/>
      <span class="brand-name">Book<span class="n">Nest</span></span>
    </a>
    <div class="nav-actions">
      <a href="index.html#rooms" class="btn-gold">Book a Room</a>
      <button class="btn-ghost" id="logoutBtn">Logout</button>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="container">
    <div id="content">
      <div class="loading"><div class="spinner"></div><p style="margin-top:14px">Loading your profile…</p></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://zbbzxayolamexndbtpox.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_J_Xd5Ft8BtG1Ev7IixUGLg_HifPfCeq';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const fmt = n => '₹' + Number(n||0).toLocaleString('en-IN');
  const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const initials = name => (name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();

  document.getElementById('logoutBtn').onclick = async ()=>{
    await sb.auth.signOut();
    location.replace('login.html');
  };

  (async ()=>{
    const { data:{ session } } = await sb.auth.getSession();
    if(!session){ location.replace('login.html'); return; }
    const user = session.user;

    // Load profile (fallback to auth metadata if row not ready)
    let prof = null;
    const pr = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
    prof = pr.data || {
      full_name: user.user_metadata?.full_name || 'Guest',
      email: user.email,
      phone: user.user_metadata?.phone || '—',
      created_at: user.created_at
    };

    // Load this user's past stays (bookings)
    const br = await sb.from('bookings').select('*').eq('user_id', user.id).order('created_at',{ascending:false});
    const stays = br.data || [];

    const memberSince = new Date(prof.created_at).toLocaleDateString('en-IN',{year:'numeric',month:'long'});

    const staysHtml = stays.length ? `
      <div class="stays">
        ${stays.map(s=>`
          <article class="stay">
            <img src="${encodeURI(s.room_name ? roomImg(s.room_type) : 'ScVZdx2Y_400x400.jpg')}" alt="${esc(s.room_name)}" onerror="this.style.display='none'"/>
            <div class="stay-body">
              <h3>${esc(s.room_name || s.room_type)}</h3>
              <div class="dates">📅 ${esc(s.check_in)} → ${esc(s.check_out)}</div>
              <div class="stay-tags">
                <span class="ref">Ref ${esc(s.ref||'—')}</span>
                <span class="nights">${s.nights||'?'} night(s)</span>
                <span class="total">${fmt(s.total)}</span>
              </div>
            </div>
          </article>`).join('')}
      </div>` : `
      <div class="empty">
        🛏️ You have no stays yet.<br/>
        <a href="index.html#rooms">Browse rooms and book your first stay →</a>
      </div>`;

    document.getElementById('content').innerHTML = `
      <div class="profile-card">
        <div class="avatar">${esc(initials(prof.full_name))}</div>
        <div class="p-info">
          <h1>${esc(prof.full_name || 'Guest')}</h1>
          <div class="meta">
            <span><b>Email:</b> ${esc(prof.email)}</span>
            <span><b>Mobile:</b> ${esc(prof.phone || '—')}</span>
            <span><b>Member since:</b> ${esc(memberSince)}</span>
          </div>
        </div>
      </div>
      <div class="section-title">
        <h2>Your Past Stays</h2>
        <span class="count">${stays.length} booking(s)</span>
      </div>
      ${staysHtml}`;
  })();

  // Map room_type id -> image (mirrors index.html room list)
  function roomImg(type){
    const map = {
      'heritage':'Pushp-Dwaar-Blooming-Meadows-Wallpaper-Mural-M2-710x488.jpg',
      'grey-loft':'2122ead425fca999868aec6814617254.jpg',
      'emerald':'design-style-room-interior-wallpaper-preview.jpg',
      'mono':'ed8a8f510b0929d16f8959e3f5d10e68.jpg',
      'ocean':'minimalist-living-room-adorned-with-blue-coral-reef-canvas-and-underwater-view-photo.jpeg',
      'forest':'stylish-living-room-with-expansive-windows-in-a-bright-open-layout-photo.jpg',
      'nordic':'images.jpg',
      'scandi':'images (1).jpg',
      'twin':'images (2).jpg'
    };
    return map[type] || 'ScVZdx2Y_400x400.jpg';
  }
</script>
</body>
</html>
